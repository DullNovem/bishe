spring:
  application:
    name: spam-sms-detection
  datasource:
    url: jdbc:mysql://localhost:3306/spam_sms_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: 74779804
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        '[format_sql]': true

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Python ML Model Server 配置
ml:
  server:
    url: http://localhost:5000
    predict-endpoint: /predict
    reload-endpoint: /reload-models
  training:
    python-executable: ../.venv/Scripts/python.exe
    script-path: ../ml-model/src/retrain_from_feedback.py
    workdir: ../ml-model
    timeout-seconds: 300

logging:
  level:
    root: INFO
    '[com.bishe]': DEBUG
